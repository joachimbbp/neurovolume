# Leaving this in the repo because it's a nice "just works" config 
# Eventually we might build out some python format requirements
# that will be reflected here

[[language]]
name = "python"
auto-format = true
formatter = { command = "ruff", args = ["format", "-"] }
language-servers = [
    {name = "pyright"}, # type chekcer
    {name = "ruff"}, # linter and formatter
]

[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]
config = {}

[language-server.ruff]
command = "ruff"
args = ["server"]
config = {}

# from https://github.com/bernardassan/awesome-helix/blob/main/languages.toml
[[language]]
name = "zig"
auto-format = true

[language-server.zls.config]
enable_build_on_save = true
build_on_save_args = ["check", "-fincremental", "--watch"]
force_autofix = true
warn_style = true
highlight_global_var_declarations = true
#inlay hints. Copypasta:
enable_inlay_hints = true
inlay_hints_show_variable_type_hints = true
inlay_hints_show_parameter_name_hints = true
inlay_hints_show_struct_literal_field_type = true
